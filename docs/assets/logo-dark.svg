<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fb6400"/>
      <stop offset="100%" stop-color="#e55500"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#ffe0cc"/>
    </linearGradient>
  </defs>
  <!-- Icon: rounded square with branch/check motif -->
  <rect x="8" y="12" width="96" height="96" rx="20" fill="url(#bg)"/>
  <!-- Git branch lines -->
  <path d="M40 36 L40 64 Q40 76 52 76 L72 76" stroke="url(#check)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M40 48 Q40 56 50 56 L62 56" stroke="url(#check)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Branch dots -->
  <circle cx="40" cy="36" r="5" fill="#fff"/>
  <circle cx="72" cy="76" r="5" fill="#fff"/>
  <circle cx="62" cy="56" r="5" fill="#fff"/>
  <!-- Check mark overlay -->
  <path d="M58 82 L66 90 L82 70" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
</svg>
